<div class="space-y-6">
  <div class="flex justify-end">
    <button
      (click)="openTally()"
      class="rounded-xl bg-emerald-500 px-5 py-3 font-medium text-black transition hover:opacity-90"
    >
      Nova participação
    </button>

    <app-tally-sheet [isOpen]="isTallyOpen" />
  </div>

  <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
    @for (metric of metrics(); track metric.title) {
      <app-metric-card
        [title]="metric.title"
        [value]="metric.value"
        [description]="metric.description"
        [trend]="metric.trend"
        [percentage]="metric.percentage"
      />
    }
  </div>

  <div class="grid grid-cols-1 gap-6 xl:grid-cols-3">
    <div class="xl:col-span-2">
      <app-line-chart [analytics]="analytics()" />
    </div>

    <div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-5">
      <p class="text-sm text-zinc-400">Participação média</p>

      <h2 class="mt-2 text-4xl font-bold text-white">{{ averageParticipation() }}%</h2>

      <p class="mt-2 text-sm text-emerald-400">Baseado nos últimos meses</p>
    </div>

    <app-ranking-list [rankings]="topRankings()" />

    <app-activity-feed [activities]="activities()" />

    <app-progress-chart [items]="progress()" />
  </div>

  <div class="rounded-2xl border border-zinc-800 bg-zinc-900 p-5">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-sm text-zinc-400">Eventos ativos</p>

        <h2 class="mt-2 text-3xl font-bold text-white">
          {{ activeEventsCount() }}
        </h2>
      </div>

      <div class="rounded-full bg-emerald-500/15 px-3 py-1 text-sm font-medium text-emerald-400">
        Em andamento
      </div>
    </div>
  </div>

  <app-event-table [events]="activeEvents()" />
</div>
