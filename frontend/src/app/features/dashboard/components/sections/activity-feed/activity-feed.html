<div class="rounded-2xl border border-white/10 bg-zinc-900 p-6">
  <div class="mb-6">
    <h2 class="text-xl font-semibold text-white">Atividades recentes</h2>

    <p class="text-sm text-zinc-400">Atualizações em tempo real</p>
  </div>

  <div class="space-y-4">
    @for (activity of activities; track activity.id) {
      <div class="flex items-start gap-4 rounded-xl border border-white/5 bg-zinc-800/40 p-4">
        <div class="mt-1 h-3 w-3 rounded-full bg-emerald-400"></div>

        <div class="flex-1">
          <p class="text-sm text-white">
            <span class="font-semibold">
              {{ activity.user }}
            </span>

            {{ activity.action }}
          </p>

          <span class="text-xs text-zinc-500">
            {{ activity.date }}
          </span>
        </div>
      </div>
    }
  </div>
</div>
